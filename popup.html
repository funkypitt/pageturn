<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #222;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #1a1a1a;
      color: #fff;
    }
    button:hover {
      background: #333;
    }
    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>PageTurn</h2>
  <button id="toggle">Start Reading Mode</button>
  <div class="hint">Shortcut: Alt+P</div>
  <script src="popup.js"></script>
</body>
</html>
